<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Farmácia UMEM — Controle de Estoque</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#4A6741;--surf:#F4F6F2;--surf2:#DDE3D8;--border:#B8C4B0;
  --accent:#4A6741;--accdark:#345230;--accglow:rgba(74,103,65,.15);
  --danger:#8B2020;--dangerl:#B03030;--warn:#7A5C1E;
  --text:#1E2B1A;--muted:#5A7050;--dim:#8A9E80;--gold:#5C4A1A;
  --camo1:#6B7C5A;--camo2:#4A5C3A;--camo3:#8A9E7A;--camo4:#3A4A2E;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;font-size:15px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--surf2);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}



input,select,textarea{background:#fff;color:var(--text);border:1.5px solid var(--border);border-radius:6px;padding:9px 12px;font-family:inherit;font-size:14px;width:100%;outline:none;transition:border-color .2s;box-shadow:inset 0 1px 3px rgba(0,0,0,.06);}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,103,65,.15);}
select option{background:#fff;color:var(--text);}
textarea{resize:vertical;}
button{cursor:pointer;font-family:inherit;border:none;border-radius:6px;transition:all .15s;font-weight:600;font-size:14px;}
.btn-primary{background:var(--accent);color:#fff;padding:9px 20px;box-shadow:0 2px 4px rgba(74,103,65,.3);}
.btn-primary:hover{background:var(--accdark);}
.btn-danger{background:var(--danger);color:#fff;padding:9px 20px;}
.btn-danger:hover{background:var(--dangerl);}
.btn-ghost{background:rgba(255,255,255,.7);color:var(--muted);border:1.5px solid var(--border);padding:9px 20px;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-outline{background:transparent;color:var(--accent);border:1.5px solid var(--accent);padding:9px 20px;}
.btn-sm{padding:5px 12px;font-size:12px;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-box{background:rgba(255,255,255,.96);border:2px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;text-align:center;box-shadow:0 8px 32px rgba(58,74,46,.15);backdrop-filter:blur(4px);}
.login-logo{font-size:52px;margin-bottom:10px;}
.login-title{font-family:'Share Tech Mono',monospace;color:var(--accent);font-size:20px;letter-spacing:.1em;margin-bottom:4px;font-weight:700;}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:28px;}
.login-box .field{text-align:left;margin-bottom:16px;}
.login-box .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;}
.login-err{color:var(--danger);font-size:13px;margin-top:10px;min-height:18px;}
.login-stripe{height:6px;background:repeating-linear-gradient(90deg,var(--camo4) 0px,var(--camo4) 20px,var(--camo2) 20px,var(--camo2) 45px,var(--camo1) 45px,var(--camo1) 65px,var(--camo3) 65px,var(--camo3) 90px);border-radius:0 0 6px 6px;margin-top:24px;}

/* HEADER */
#header{background:linear-gradient(135deg,var(--camo4) 0%,var(--camo2) 40%,var(--camo1) 70%,var(--camo3) 100%);border-bottom:3px solid var(--camo4);padding:12px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(58,74,46,.3);}
#header .logo{width:40px;height:40px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
#header .title{font-family:'Share Tech Mono',monospace;font-weight:700;font-size:16px;color:#fff;letter-spacing:.1em;text-shadow:1px 1px 2px rgba(0,0,0,.4);}
#header .subtitle{font-size:11px;color:rgba(255,255,255,.75);letter-spacing:.04em;}
#header .hdr-actions{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;}
#header .btn-ghost{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3);}
#header .btn-ghost:hover{background:rgba(255,255,255,.28);border-color:rgba(255,255,255,.6);}
#header .btn-outline{color:#fff;border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.1);}

/* NAV */
#nav{background:linear-gradient(90deg,var(--camo2),var(--camo1));border-bottom:2px solid var(--camo4);padding:0 16px;display:flex;gap:2px;overflow-x:auto;box-shadow:0 2px 4px rgba(0,0,0,.1);}
.nav-tab{background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.65);padding:11px 18px;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;position:relative;transition:all .15s;letter-spacing:.03em;}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,.1);}
.nav-tab.active{color:#fff;border-bottom-color:#fff;background:rgba(255,255,255,.15);}
.nav-tab .dot{position:absolute;top:7px;right:5px;width:7px;height:7px;background:#FFD700;border-radius:50%;box-shadow:0 0 4px #FFD700;}

#content{max-width:1100px;margin:0 auto;padding:24px 16px;}

/* CARDS */
.card{background:rgba(255,255,255,.88);border:1.5px solid var(--border);border-radius:10px;padding:20px 24px;box-shadow:0 2px 8px rgba(58,74,46,.08);backdrop-filter:blur(2px);}
.card-table{padding:0;overflow:hidden;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;}
.stat-card{background:rgba(255,255,255,.9);border:1.5px solid var(--border);border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 6px rgba(58,74,46,.1);}
.stat-card .icon{font-size:26px;flex-shrink:0;}
.stat-card .val{font-family:'Share Tech Mono',monospace;font-size:26px;font-weight:700;}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;}

/* TABLES */
table{width:100%;border-collapse:collapse;}
th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#fff;padding:10px 14px;text-align:left;white-space:nowrap;background:var(--camo2);}
th:first-child{border-radius:0;}
td{padding:10px 14px;border-bottom:1px solid rgba(184,196,176,.4);font-size:14px;vertical-align:middle;background:rgba(255,255,255,.6);}
tr:nth-child(even) td{background:rgba(221,227,216,.4);}
tr:hover td{background:rgba(74,103,65,.1)!important;}
.tbl-wrap{overflow-x:auto;}
.mono{font-family:'Share Tech Mono',monospace;}
.empty-row td{text-align:center;color:var(--muted);padding:36px!important;background:transparent!important;}

/* BADGE */
.badge{border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;letter-spacing:.05em;white-space:nowrap;border:1.5px solid;}

/* ALERTS */
.alert-crit{background:rgba(139,32,32,.08);border:1.5px solid rgba(139,32,32,.35);border-radius:10px;padding:16px 20px;}
.alert-title{color:var(--dangerl);font-weight:700;margin-bottom:10px;}
.crit-chips{display:flex;flex-wrap:wrap;gap:8px;}
.crit-chip{background:#fff;border:1.5px solid rgba(139,32,32,.3);border-radius:6px;padding:6px 12px;font-size:13px;}
.crit-chip span{color:var(--danger);margin-left:8px;font-weight:700;}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,43,26,.55);z-index:999;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px);}
#modal-overlay.open{display:flex;}
.modal-box{background:#fff;border:2px solid var(--border);border-radius:12px;width:100%;max-width:540px;max-height:92vh;overflow:auto;box-shadow:0 12px 40px rgba(58,74,46,.25);}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;border-bottom:2px solid var(--surf2);background:linear-gradient(90deg,var(--camo2),var(--camo1));}
.modal-head span{font-weight:700;font-size:15px;color:#fff;letter-spacing:.04em;}
.modal-close{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;font-size:18px;cursor:pointer;border-radius:4px;padding:2px 8px;line-height:1;}
.modal-body{padding:20px 22px;}

/* FORM */
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row-btns{display:flex;gap:10px;margin-top:6px;}
.row-btns button{flex:1;}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.toolbar input{flex:1 1 200px;}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap;}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;padding:12px 20px;border-radius:8px;font-weight:700;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px;box-shadow:0 4px 16px rgba(74,103,65,.4);}
#toast.show{opacity:1;}

/* HIST */
.hist-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1.5px solid var(--border);}
.hist-stats{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
.hist-stat{text-align:center;background:var(--surf2);border-radius:8px;padding:10px 18px;border:1.5px solid var(--border);}
.hist-stat .hval{font-family:'Share Tech Mono',monospace;font-size:20px;font-weight:700;}
.hist-stat .hlbl{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;}

/* CAMO DIVIDER */
.camo-bar{height:4px;background:repeating-linear-gradient(90deg,var(--camo4) 0px,var(--camo4) 18px,var(--camo2) 18px,var(--camo2) 40px,var(--camo1) 40px,var(--camo1) 58px,var(--camo3) 58px,var(--camo3) 80px);border-radius:2px;margin-bottom:20px;}


.chk-col{width:36px;}
.row-selected td{background:rgba(139,32,32,.12)!important;}
.bulk-bar{display:none;background:rgba(139,32,32,.1);border:1px solid rgba(139,32,32,.3);border-radius:8px;padding:10px 16px;align-items:center;gap:12px;margin-bottom:8px;}
.bulk-bar.show{display:flex;}

.gap16{display:flex;flex-direction:column;gap:16px;}
.gap20{display:flex;flex-direction:column;gap:20px;}
.section-head{font-weight:700;font-size:15px;margin-bottom:14px;color:var(--accent);display:flex;align-items:center;gap:8px;}

@media(max-width:600px){th,td{padding:7px 9px;font-size:12px;}.grid2{grid-template-columns:1fr;}#content{padding:14px 10px;}.card{padding:14px;}}
</style>

<script>
const DEFAULT_PASS='M@rinha123'; // admin senha hardcoded no doLogin
function getPass(){return 'M@rinha123';} // senha do admin fixa
function isLogged(){return sessionStorage.getItem('farm_auth')==='1';}
function ensureAccess(){
  if(!isLogged()){
    sessionStorage.setItem('farm_auth','1');
    sessionStorage.setItem('farm_user', JSON.stringify({id:1,nome:'SG S.OLIVEIRA',isAdmin:true}));
  }
}
ensureAccess();

function toggleSenha(){
  const inp=document.getElementById('login-pw');
  const btn=document.getElementById('btn-toggle-pw');
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁️';}
}
function toggleSenhaMod(id,btnId){
  const inp=document.getElementById(id);
  const btn=document.getElementById(btnId);
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁️';}
}

function doLogin(){
  const user = document.getElementById('login-user').value.trim().toLowerCase();
  const pw   = document.getElementById('login-pw').value;
  const err  = document.getElementById('login-err');
  err.textContent = '';

  if(!user || !pw){ err.textContent='Preencha usuário e senha.'; return; }

  // ADMIN — aceita qualquer variação do nome
  const isAdmin = ['sg s.oliveira','sgs.oliveira','s.oliveira','oliveira','sg oliveira','sgt oliveira','sgt s.oliveira'].includes(user);
  if(isAdmin && pw === 'M@rinha123'){
    sessionStorage.setItem('farm_auth','1');
    sessionStorage.setItem('farm_user', JSON.stringify({id:1,nome:'SG S.OLIVEIRA',isAdmin:true}));
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    testarConexao();
    carregar(); render(); setTimeout(verificarVencimentos, 800);
    return;
  }

  // USUÁRIOS CADASTRADOS
  carregar();
  const lista = DB.cadastros || [];
  const achou = lista.find(u =>
    u.nome.trim().toLowerCase() === user &&
    u.senha === pw &&
    u.status === 'Aprovado'
  );
  if(achou){
    sessionStorage.setItem('farm_auth','1');
    sessionStorage.setItem('farm_user', JSON.stringify(achou));
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    render(); setTimeout(verificarVencimentos, 800);
    return;
  }

  // Cadastro pendente?
  const pendente = lista.find(u => u.nome.trim().toLowerCase() === user);
  if(pendente && pendente.status === 'Pendente'){
    err.textContent = 'Cadastro pendente de aprovação pelo administrador.';
  } else {
    err.textContent = 'Usuário ou senha incorretos.';
  }
  document.getElementById('login-pw').value = '';
}
function logout(){sessionStorage.removeItem('farm_auth');location.reload();}
function alterarSenha(){
  openModal('Alterar Senha',
    '<div class="field"><label>Senha Atual</label><div style="position:relative"><input type="password" id="pw_old" style="padding-right:44px"/><button type="button" id="tog1" onclick="toggleSenhaMod(\'pw_old\',\'tog1\')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted)">👁️</button></div></div>'+
    '<div class="field"><label>Nova Senha</label><div style="position:relative"><input type="password" id="pw_new" placeholder="Mínimo 6 caracteres" style="padding-right:44px"/><button type="button" id="tog2" onclick="toggleSenhaMod(\'pw_new\',\'tog2\')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted)">👁️</button></div></div>'+
    '<div class="field"><label>Confirmar Nova Senha</label><div style="position:relative"><input type="password" id="pw_conf" style="padding-right:44px"/><button type="button" id="tog3" onclick="toggleSenhaMod(\'pw_conf\',\'tog3\')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted)">👁️</button></div></div>'+
    '<div class="login-err" id="pw_err"></div>'+
    '<div class="row-btns" style="margin-top:14px"><button class="btn-primary" onclick="salvarSenha()">Salvar</button><button class="btn-ghost" onclick="closeModal()">Cancelar</button></div>'
  );
}
function salvarSenha(){
  const o=document.getElementById('pw_old').value,n=document.getElementById('pw_new').value,c=document.getElementById('pw_conf').value,e=document.getElementById('pw_err');
  if(o!==getPass()){e.textContent='Senha atual incorreta.';return;}
  if(n.length<6){e.textContent='Mínimo 6 caracteres.';return;}
  if(n!==c){e.textContent='Senhas não coincidem.';return;}
  localStorage.setItem('farm_pass',n);closeModal();toast('✅ Senha alterada!');
}
if(isLogged()){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';}

const ADMIN_USER = {id:1, nome:'SG S.OLIVEIRA', posto_grad:'Sargento', tel:'', email:'', status:'Aprovado', isAdmin:true};

function salvar(){localStorage.setItem('farmacia_db',JSON.stringify(DB));}
function carregar(){const s=localStorage.getItem('farmacia_db');if(s)try{DB=JSON.parse(s);}catch(e){}}

function toast(msg,color='var(--accent)'){const t=document.getElementById('toast');t.textContent=msg;t.style.background=color;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function openModal(title,html){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
function badge(txt,color){return '<span class="badge" style="color:'+color+';border-color:'+color+'55;background:'+color+'18">'+txt+'</span>';}
function statusColor(m){return m.estoque<=m.estoqueMin?'var(--danger)':m.estoque<=m.estoqueMin*1.5?'var(--warn)':'var(--accent)';}
function statusLabel(m){return m.estoque<=m.estoqueMin?'CRÍTICO':m.estoque<=m.estoqueMin*1.5?'BAIXO':'OK';}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){if(!d)return '—';const[y,m,dd]=d.split('-');return dd+'/'+m+'/'+y;}
const CATS=["Analgésico","Antibiótico","Anti-inflamatório","Antialérgico","Soro","Curativo","Antisséptico","Vitamina","Outro"];
const UNS=["Comprimido","Cápsula","Frasco","Ampola","Sachê","Bisnaga","Unidade"];

function exportarDados(){const b=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='farmacia_backup_'+today()+'.json';a.click();toast('✅ Backup exportado!');}
function importarDados(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{DB=JSON.parse(ev.target.result);salvar();render();toast('✅ Dados importados!');}catch{toast('❌ Arquivo inválido!','var(--danger)');}};r.readAsText(f);e.target.value='';}

let currentTab='dashboard';
function setTab(tab){currentTab=tab;selectedMeds.clear();selectedMovs.clear();document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));render();}
function updateNavDots(){const c=DB.medicamentos.filter(m=>m.estoque<=m.estoqueMin).length;document.querySelector('[data-tab="estoque"]').innerHTML='💊 Estoque'+(c?'<span class="dot"></span>':'');}
function render(){if(!isLogged())return;updateUserHeader();const c=document.getElementById('content');if(currentTab==='dashboard')c.innerHTML=renderDashboard();else if(currentTab==='estoque')c.innerHTML=renderEstoque();else if(currentTab==='movimentos')c.innerHTML=renderMovimentos();else if(currentTab==='balanco')c.innerHTML=renderBalanco();else if(currentTab==='historico')c.innerHTML=renderHistorico();else if(currentTab==='usuarios')c.innerHTML=renderUsuarios();updateNavDots();}

function renderDashboard(){
  const meds=DB.medicamentos,movs=DB.movimentos;
  const crit=meds.filter(m=>m.estoque<=m.estoqueMin);
  const tE=movs.filter(m=>m.tipo==='ENTRADA').reduce((s,m)=>s+m.qtd,0);
  const tS=movs.filter(m=>m.tipo==='SAÍDA').reduce((s,m)=>s+m.qtd,0);
  const critHtml=crit.length?'<div class="alert-crit"><div class="alert-title">⚠️ Atenção — Estoque Crítico</div><div class="crit-chips">'+crit.map(m=>'<div class="crit-chip"><strong>'+m.nome+'</strong><span>'+m.estoque+'/'+m.estoqueMin+' '+m.unidade+'(s)</span></div>').join('')+'</div></div>':'';
  const rows=movs.slice(0,8).map(m=>'<tr><td class="mono">'+fmtDate(m.data)+'</td><td>'+badge(m.tipo==='ENTRADA'?'📥 ENTRADA':'📤 SAÍDA',m.tipo==='ENTRADA'?'var(--accent)':'var(--warn)')+'</td><td style="font-weight:600">'+m.medNome+'</td><td class="mono" style="font-weight:700;color:'+(m.tipo==='ENTRADA'?'var(--accent)':'var(--warn)')+'">'+(m.tipo==='ENTRADA'?'+':'-')+m.qtd+'</td><td style="color:var(--muted)">'+(m.missao||'—')+'</td><td style="color:var(--muted)">'+m.responsavel+'</td></tr>').join('')||'<tr class="empty-row"><td colspan="6">Nenhuma movimentação.</td></tr>';
  return '<div class="gap20"><div class="stat-grid"><div class="stat-card"><div class="icon">💊</div><div><div class="val" style="color:var(--accent)">'+meds.length+'</div><div class="lbl">Medicamentos</div></div></div><div class="stat-card"><div class="icon">📥</div><div><div class="val" style="color:var(--accent)">'+tE+'</div><div class="lbl">Total Entradas</div></div></div><div class="stat-card"><div class="icon">📤</div><div><div class="val" style="color:var(--warn)">'+tS+'</div><div class="lbl">Total Saídas</div></div></div><div class="stat-card"><div class="icon">⚠️</div><div><div class="val" style="color:'+(crit.length?'var(--danger)':'var(--muted)')+'">'+crit.length+'</div><div class="lbl">Estoque Crítico</div></div></div></div>'+critHtml+'<div class="card"><div class="section-head">📋 Últimas Movimentações</div><div class="tbl-wrap"><table><thead><tr><th>Data</th><th>Tipo</th><th>Medicamento</th><th>Qtd</th><th>Missão</th><th>Responsável</th></tr></thead><tbody>'+rows+'</tbody></table></div></div></div>';
}

let estoqueSearch='';
function renderEstoque(){
  const q=estoqueSearch.toLowerCase();
  const meds=DB.medicamentos.filter(m=>m.nome.toLowerCase().includes(q)||m.categoria.toLowerCase().includes(q));
  const hoje2=new Date();hoje2.setHours(0,0,0,0);
  const rows=meds.length?meds.map(m=>{
    const venc=m.validade?new Date(m.validade):null;if(venc)venc.setHours(0,0,0,0);
    const isVenc=venc&&venc<hoje2;const isProx=venc&&!isVenc&&(venc-hoje2)<=30*86400000;
    const vBadge=isVenc?badge('VENCIDO','var(--danger)'):isProx?badge('VENCE EM BREVE','var(--warn)'):'';
    const sel=selectedMeds.has(m.id);
    return '<tr class="'+(sel?'row-selected':'')+'" onclick="toggleSelectMed('+m.id+');render()">'+
    '<td class="chk-col"><input type="checkbox" class="chk-med" data-id="'+m.id+'" '+(sel?'checked':'')+' onclick="event.stopPropagation();toggleSelectMed('+m.id+');render()"/></td>'+
    '<td style="font-weight:700">'+m.nome+'</td>'+
    '<td style="color:var(--muted)">'+(m.categoria||'—')+'</td>'+
    '<td style="color:var(--muted)">'+m.unidade+'</td>'+
    '<td class="mono" style="font-weight:700;color:'+statusColor(m)+'">'+m.estoque+'</td>'+
    '<td class="mono" style="color:var(--muted)">'+m.estoqueMin+'</td>'+
    '<td>'+(m.validade?fmtDate(m.validade):'—')+' '+vBadge+'</td>'+
    '<td>'+badge(statusLabel(m),statusColor(m))+'</td>'+
    '<td><div style="display:flex;gap:6px" onclick="event.stopPropagation()"><button class="btn-ghost btn-sm" onclick="abrirEditMed('+m.id+')">✏️</button><button class="btn-danger btn-sm" onclick="confirmarDelMed('+m.id+')">🗑️</button></div></td>'+
    '</tr>';
  }).join(''):'<tr class="empty-row"><td colspan="9">Nenhum medicamento encontrado.</td></tr>';
  return '<div class="gap16">'+
    '<div class="toolbar"><input placeholder="🔍 Buscar medicamento ou categoria…" value="'+estoqueSearch+'" oninput="estoqueSearch=this.value;render()"/><button class="btn-primary" onclick="abrirAddMed()">+ Novo Medicamento</button></div>'+
    '<div class="bulk-bar" id="bulk-bar-med">'+
      '<span style="font-weight:700;color:var(--danger)"><span id="bulk-count-med">0</span> selecionado(s)</span>'+
      '<button class="btn-danger btn-sm" onclick="excluirSelecionadosMed()">🗑️ Excluir Selecionados</button>'+
      '<button class="btn-ghost btn-sm" onclick="selectedMeds.clear();render()">✕ Cancelar</button>'+
    '</div>'+
    '<div class="card card-table"><div class="tbl-wrap"><table>'+
    '<thead><tr>'+
      '<th class="chk-col"><input type="checkbox" onclick="toggleAllMeds(this.checked)"/></th>'+
      '<th>Medicamento</th><th>Categoria</th><th>Unidade</th><th>Estoque</th><th>Mínimo</th><th>Validade</th><th>Status</th><th>Ações</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div></div></div>';
}
function abrirAddMed(){openModal('Novo Medicamento',formMed({}));}
function abrirEditMed(id){openModal('Editar Medicamento',formMed(DB.medicamentos.find(x=>x.id===id)));}
function formMed(m){
  const cOpts=CATS.map(c=>'<option '+(m.categoria===c?'selected':'')+'>'+c+'</option>').join('');
  const uOpts=UNS.map(u=>'<option '+((m.unidade||'Comprimido')===u?'selected':'')+'>'+u+'</option>').join('');
  return '<div class="field"><label>Nome *</label><input id="f_nome" value="'+(m.nome||'')+'" placeholder="Ex: Dipirona 500mg"/></div><div class="grid2"><div class="field"><label>Categoria</label><select id="f_cat"><option value="">Selecione</option>'+cOpts+'</select></div><div class="field"><label>Unidade</label><select id="f_un">'+uOpts+'</select></div><div class="field"><label>Estoque Atual *</label><input id="f_est" type="number" min="0" value="'+(m.estoque??'')+'" placeholder="0"/></div><div class="field"><label>Estoque Mínimo *</label><input id="f_min" type="number" min="0" value="'+(m.estoqueMin??'')+'" placeholder="0"/></div><div class="field" style="grid-column:1/-1"><label>Validade (data)</label><input id="f_validade" type="date" value="'+(m.validade||'')+'"/></div></div><div class="row-btns"><button class="btn-primary" onclick="salvarMed('+(m.id||0)+')">Salvar</button><button class="btn-ghost" onclick="closeModal()">Cancelar</button></div>';
}
function salvarMed(id){
  const nome=document.getElementById('f_nome').value.trim(),est=document.getElementById('f_est').value,min=document.getElementById('f_min').value;
  if(!nome||est===''||min===''){toast('Preencha os campos obrigatórios','var(--warn)');return;}
  const val=document.getElementById('f_validade').value;if(id===0){DB.medicamentos.push({id:DB.nextMedId++,nome,categoria:document.getElementById('f_cat').value,unidade:document.getElementById('f_un').value,estoque:Number(est),estoqueMin:Number(min),validade:val});toast('✅ Adicionado!');}
  else{const m=DB.medicamentos.find(x=>x.id===id);m.nome=nome;m.categoria=document.getElementById('f_cat').value;m.unidade=document.getElementById('f_un').value;m.estoque=Number(est);m.estoqueMin=Number(min);m.validade=document.getElementById('f_validade').value;toast('✅ Atualizado!');}
  salvar();closeModal();render();
}
function confirmarDelMed(id){const m=DB.medicamentos.find(x=>x.id===id);openModal('Confirmar Exclusão','<p style="margin-bottom:20px">Excluir <strong>'+m.nome+'</strong>?</p><div class="row-btns"><button class="btn-danger" onclick="deletarMed('+id+')">Excluir</button><button class="btn-ghost" onclick="closeModal()">Cancelar</button></div>');}
function deletarMed(id){DB.medicamentos=DB.medicamentos.filter(m=>m.id!==id);salvar();closeModal();render();toast('🗑️ Excluído.','var(--muted)');}

let movFilter='TODOS',movSearch='',movDataDe='',movDataAte='';
function renderMovimentos(){
  const q=movSearch.toLowerCase();
  const movs=DB.movimentos.filter(m=>(movFilter==='TODOS'||m.tipo===movFilter)&&(!movDataDe||m.data>=movDataDe)&&(!movDataAte||m.data<=movDataAte)&&(m.medNome.toLowerCase().includes(q)||m.missao.toLowerCase().includes(q)||m.responsavel.toLowerCase().includes(q)));
  const tE=movs.filter(m=>m.tipo==='ENTRADA').reduce((s,m)=>s+m.qtd,0);
  const tS=movs.filter(m=>m.tipo==='SAÍDA').reduce((s,m)=>s+m.qtd,0);
  const rows=movs.length?movs.map(m=>{
    const sel=selectedMovs.has(m.id);
    return '<tr class="'+(sel?'row-selected':'')+'" onclick="toggleSelectMov('+m.id+');render()">'+
    '<td class="chk-col"><input type="checkbox" class="chk-mov" data-id="'+m.id+'" '+(sel?'checked':'')+' onclick="event.stopPropagation();toggleSelectMov('+m.id+');render()"/></td>'+
    '<td class="mono">'+fmtDate(m.data)+'</td>'+
    '<td>'+badge(m.tipo==='ENTRADA'?'📥 ENT':'📤 SAÍ',m.tipo==='ENTRADA'?'var(--accent)':'var(--warn)')+'</td>'+
    '<td style="font-weight:600">'+m.medNome+'</td>'+
    '<td class="mono" style="font-weight:700;color:'+(m.tipo==='ENTRADA'?'var(--accent)':'var(--warn)')+'">'+(m.tipo==='ENTRADA'?'+':'-')+m.qtd+'</td>'+
    '<td style="color:var(--muted)">'+(m.missao||'—')+'</td>'+
    '<td>'+m.responsavel+'</td>'+
    '<td style="color:var(--muted);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(m.obs||'—')+'</td>'+
    '<td><div style="display:flex;gap:5px" onclick="event.stopPropagation()"><button class="btn-ghost btn-sm" onclick="abrirEditMov('+m.id+')">✏️</button><button class="btn-danger btn-sm" onclick="confirmarDelMov('+m.id+')">🗑️</button></div></td>'+
    '</tr>';
  }).join(''):'<tr class="empty-row"><td colspan="9">Nenhum registro.</td></tr>';
  const fBtns=['TODOS','ENTRADA','SAÍDA'].map(f=>'<button class="'+(f===movFilter?'btn-primary':'btn-ghost')+' btn-sm" onclick="movFilter=\''+f+'\';render()">'+(f==='ENTRADA'?'📥 Entradas':f==='SAÍDA'?'📤 Saídas':'Todos')+'</button>').join('');
  return '<div class="gap16">'+
    '<div class="toolbar"><input placeholder="🔍 Buscar medicamento, missão ou responsável…" value="'+movSearch+'" oninput="movSearch=this.value;render()" style="flex:1 1 180px"/><div class="filter-btns">'+fBtns+'</div><button class="btn-primary" onclick="abrirAddMov()">+ Registrar</button></div>'+
    '<div class="bulk-bar" id="bulk-bar-mov">'+
      '<span style="font-weight:700;color:var(--danger)"><span id="bulk-count-mov">0</span> selecionada(s)</span>'+
      '<button class="btn-danger btn-sm" onclick="excluirSelecionadosMov()">🗑️ Excluir Selecionadas</button>'+
      '<button class="btn-ghost btn-sm" onclick="selectedMovs.clear();render()">✕ Cancelar</button>'+
    '</div>'+'<div class="card" style="padding:14px 18px"><div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end"><div class="field" style="margin:0;flex:1 1 130px"><label>De</label><input type="date" value="'+movDataDe+'" onchange="movDataDe=this.value;render()"/></div><div class="field" style="margin:0;flex:1 1 130px"><label>Até</label><input type="date" value="'+movDataAte+'" onchange="movDataAte=this.value;render()"/></div><button class="btn-ghost btn-sm" onclick="movDataDe=\'\';movDataAte=\'\';render()" style="white-space:nowrap">✕ Limpar</button><div style="margin-left:auto;display:flex;gap:14px;align-items:center"><span style="font-size:13px;color:var(--muted)">Entradas: <strong style="color:var(--accent)">'+tE+'</strong></span><span style="font-size:13px;color:var(--muted)">Saídas: <strong style="color:var(--warn)">'+tS+'</strong></span></div></div></div><div class="card card-table"><div class="tbl-wrap"><table><thead><tr><th>Data</th><th>Tipo</th><th>Medicamento</th><th>Qtd</th><th>Missão/Origem</th><th>Responsável</th><th>Obs</th><th>Ações</th></tr></thead><tbody>'+rows+'</tbody></table></div></div></div>';

function abrirAddMov(){openModal('Registrar Movimentação',formMov({}));}
function abrirEditMov(id){openModal('Editar Movimentação',formMov(DB.movimentos.find(x=>x.id===id)));}
function formMov(m){
  const mOpts=DB.medicamentos.map(x=>'<option value="'+x.id+'" '+(m.medId===x.id?'selected':'')+'>'+x.nome+' (estoque: '+x.estoque+')</option>').join('');
  return '<div class="grid2"><div class="field"><label>Tipo *</label><select id="f_tipo"><option value="ENTRADA" '+(!m.tipo||m.tipo==='ENTRADA'?'selected':'')+'>📥 Entrada</option><option value="SAÍDA" '+(m.tipo==='SAÍDA'?'selected':'')+'>📤 Saída</option></select></div><div class="field"><label>Data *</label><input id="f_data" type="date" value="'+(m.data||today())+'"/></div></div><div class="field"><label>Medicamento *</label><select id="f_med"><option value="">Selecione</option>'+mOpts+'</select></div><div class="grid2"><div class="field"><label>Quantidade *</label><input id="f_qtd" type="number" min="1" value="'+(m.qtd||'')+'" placeholder="0"/></div><div class="field"><label>Missão / Origem</label><input id="f_missao" value="'+(m.missao||'')+'" placeholder="Ex: Missão Alpha"/></div></div><div class="field"><label>Responsável *</label><input id="f_resp" value="'+(m.responsavel||'')+'" placeholder="Nome / Posto/Grad."/></div><div class="field"><label>Observações</label><textarea id="f_obs" rows="2">'+(m.obs||'')+'</textarea></div><div class="row-btns"><button class="btn-primary" onclick="salvarMov('+(m.id||0)+')">Salvar</button><button class="btn-ghost" onclick="closeModal()">Cancelar</button></div>';
}
function salvarMov(id){
  const tipo=document.getElementById('f_tipo').value,medId=Number(document.getElementById('f_med').value),qtd=Number(document.getElementById('f_qtd').value),data=document.getElementById('f_data').value,resp=document.getElementById('f_resp').value.trim();
  if(!medId||!qtd||!data||!resp){toast('Preencha os campos obrigatórios','var(--warn)');return;}
  const med=DB.medicamentos.find(x=>x.id===medId);
  if(id===0){
    if(tipo==='SAÍDA'&&qtd>med.estoque){toast('❌ Quantidade maior que o estoque!','var(--danger)');return;}
    DB.movimentos.unshift({id:DB.nextMovId++,tipo,medId,medNome:med.nome,qtd,data,missao:document.getElementById('f_missao').value,responsavel:resp,obs:document.getElementById('f_obs').value});
    med.estoque+=tipo==='ENTRADA'?qtd:-qtd;toast('✅ Registrado!');
  } else {
    const old=DB.movimentos.find(x=>x.id===id),oldMed=DB.medicamentos.find(x=>x.id===old.medId);
    oldMed.estoque+=old.tipo==='ENTRADA'?-old.qtd:old.qtd;
    if(tipo==='SAÍDA'&&qtd>med.estoque){oldMed.estoque+=old.tipo==='ENTRADA'?old.qtd:-old.qtd;toast('❌ Quantidade maior que o estoque!','var(--danger)');return;}
    med.estoque+=tipo==='ENTRADA'?qtd:-qtd;
    Object.assign(old,{tipo,medId,medNome:med.nome,qtd,data,missao:document.getElementById('f_missao').value,responsavel:resp,obs:document.getElementById('f_obs').value});
    toast('✅ Atualizado!');
  }
  salvar();closeModal();render();
}
function confirmarDelMov(id){const m=DB.movimentos.find(x=>x.id===id);openModal('Confirmar Exclusão','<p style="margin-bottom:20px">Excluir <strong>'+m.tipo+'</strong> de <strong>'+m.medNome+'</strong> ('+m.qtd+' un)?<br><small style="color:var(--muted)">O estoque será ajustado.</small></p><div class="row-btns"><button class="btn-danger" onclick="deletarMov('+id+')">Excluir</button><button class="btn-ghost" onclick="closeModal()">Cancelar</button></div>');}
function deletarMov(id){const m=DB.movimentos.find(x=>x.id===id),med=DB.medicamentos.find(x=>x.id===m.medId);if(med)med.estoque+=m.tipo==='ENTRADA'?-m.qtd:m.qtd;DB.movimentos=DB.movimentos.filter(x=>x.id!==id);salvar();closeModal();render();toast('🗑️ Excluído.','var(--muted)');}

let balMissao='',balDe='',balAte='';
function renderBalanco(){
  const missoes=[...new Set(DB.movimentos.map(m=>m.missao).filter(Boolean))];
  const movs=DB.movimentos.filter(m=>(!balMissao||m.missao===balMissao)&&(!balDe||m.data>=balDe)&&(!balAte||m.data<=balAte));
  const tE=movs.filter(m=>m.tipo==='ENTRADA').reduce((s,m)=>s+m.qtd,0);
  const tS=movs.filter(m=>m.tipo==='SAÍDA').reduce((s,m)=>s+m.qtd,0);
  const saldo=tE-tS;
  const map={};movs.forEach(m=>{if(!map[m.medId])map[m.medId]={nome:m.medNome,e:0,s:0,medId:m.medId};m.tipo==='ENTRADA'?map[m.medId].e+=m.qtd:map[m.medId].s+=m.qtd;});
  const byMed=Object.values(map).sort((a,b)=>b.s-a.s);
  const mOpts=missoes.map(m=>'<option '+(balMissao===m?'selected':'')+'>'+m+'</option>').join('');

// IMPORTAR TABELA PDF/EXCEL
function importarTabela(e){
  const file = e.target.files[0];
  if(!file){ return; }
  e.target.value = '';
  const ext = file.name.split('.').pop().toLowerCase();

  if(ext === 'csv'){
    const reader = new FileReader();
    reader.onload = ev => processarCSV(ev.target.result, file.name);
    reader.readAsText(file, 'UTF-8');
  } else if(ext === 'xlsx' || ext === 'xls'){
    const reader = new FileReader();
    reader.onload = ev => processarXLSX(ev.target.result, file.name);
    reader.readAsArrayBuffer(file);
  } else if(ext === 'pdf'){
    toast('⚠️ PDF: Use Exportar como Excel/CSV no seu sistema e importe aqui.','var(--warn)');
    openModal('Importar PDF',
      '<p style="margin-bottom:14px;color:var(--muted);font-size:14px">Arquivos PDF não podem ser lidos diretamente pelo navegador.<br><br>'+
      'Para importar dados de um PDF:</p>'+
      '<ol style="margin-left:18px;margin-bottom:16px;font-size:14px;line-height:2;color:var(--text)">'+
      '<li>Abra o PDF no seu computador</li>'+
      '<li>Copie os dados e cole em Excel ou Google Sheets</li>'+
      '<li>Salve como <strong>.xlsx</strong> ou <strong>.csv</strong></li>'+
      '<li>Importe o arquivo aqui</li></ol>'+
      '<p style="font-size:13px;color:var(--muted)">Alternativamente, use a função de <strong>entrada manual</strong> no Estoque.</p>'+
      '<div class="row-btns"><button class="btn-primary" onclick="document.getElementById(\'importTabela\').click();closeModal()">📊 Importar Excel/CSV</button><button class="btn-ghost" onclick="closeModal()">Fechar</button></div>'
    );
  } else {
    toast('❌ Formato não suportado. Use .xlsx, .xls ou .csv','var(--danger)');
  }
}

function processarCSV(text, filename){
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if(lines.length < 2){ toast('❌ CSV vazio ou inválido','var(--danger)'); return; }

  // Detect separator
  const sep = lines[0].includes(';') ? ';' : ',';
  const headers = lines[0].split(sep).map(h => h.trim().toLowerCase()
    .replace(/[áàãâ]/g,'a').replace(/[éê]/g,'e').replace(/[í]/g,'i')
    .replace(/[óõô]/g,'o').replace(/[ú]/g,'u').replace(/[ç]/g,'c'));

  // Map columns
  const iNome   = headers.findIndex(h => h.includes('nome') || h.includes('medicamento') || h.includes('produto') || h.includes('descricao') || h.includes('item'));
  const iQtd    = headers.findIndex(h => h.includes('qtd') || h.includes('quant') || h.includes('estoque') || h.includes('saldo') || h.includes('total'));
  const iCat    = headers.findIndex(h => h.includes('categ') || h.includes('tipo') || h.includes('classe') || h.includes('grupo'));
  const iUn     = headers.findIndex(h => h.includes('unid') || h.includes('und') || h.includes('apresent'));
  const iMin    = headers.findIndex(h => h.includes('min') || h.includes('critico') || h.includes('limite'));
  const iTipo   = headers.findIndex(h => h.includes('tipo') || h.includes('movim') || h.includes('operac'));
  const iData   = headers.findIndex(h => h.includes('data') || h.includes('date'));
  const iResp   = headers.findIndex(h => h.includes('resp') || h.includes('operador') || h.includes('usuario'));
  const iMissao = headers.findIndex(h => h.includes('missao') || h.includes('origem') || h.includes('destino') || h.includes('local'));

  if(iNome < 0){ toast('❌ Coluna "Nome" não encontrada no arquivo','var(--danger)'); return; }

  // Detect if it's movements or stock
  const isMovimento = iTipo >= 0 || headers.some(h => h.includes('entrada') || h.includes('saida'));

  const rows = lines.slice(1).map(l => l.split(sep).map(c => c.replace(/^"|"$/g,'').trim()));
  let adicionados = 0, atualizados = 0, movimentos = 0;

  if(isMovimento){
    // Process as movements
    rows.forEach(r => {
      if(!r[iNome]) return;
      const nomeMed = r[iNome];
      const tipo = iTipo >= 0 ? (r[iTipo].toUpperCase().includes('SAI') ? 'SAÍDA' : 'ENTRADA') : 'ENTRADA';
      const qtd = Math.abs(parseInt(iQtd >= 0 ? r[iQtd] : 0)) || 0;
      const data = iData >= 0 ? normalizarData(r[iData]) : today();
      const resp = iResp >= 0 ? r[iResp] : 'Importação';
      const missao = iMissao >= 0 ? r[iMissao] : filename;
      if(!qtd) return;
      let med = DB.medicamentos.find(m => m.nome.toLowerCase() === nomeMed.toLowerCase());
      if(!med){
        med = {id: DB.nextMedId++, nome: nomeMed, categoria: iCat>=0?r[iCat]:'', unidade: iUn>=0?r[iUn]:'Unidade', estoque:0, estoqueMin:0};
        DB.medicamentos.push(med);
      }
      DB.movimentos.unshift({id:DB.nextMovId++, tipo, medId:med.id, medNome:med.nome, qtd, data, missao, responsavel:resp, obs:'Importado: '+filename});
      med.estoque += tipo==='ENTRADA' ? qtd : -qtd;
      movimentos++;
    });
    salvar(); render();
    toast('✅ '+movimentos+' movimentações importadas!');
  } else {
    // Process as stock list
    rows.forEach(r => {
      if(!r[iNome]) return;
      const nome = r[iNome];
      const qtd  = parseInt(iQtd >= 0 ? r[iQtd] : 0) || 0;
      const cat  = iCat >= 0 ? r[iCat] : '';
      const un   = iUn  >= 0 ? r[iUn]  : 'Unidade';
      const min  = parseInt(iMin >= 0 ? r[iMin] : 0) || 0;
      const existing = DB.medicamentos.find(m => m.nome.toLowerCase() === nome.toLowerCase());
      if(existing){ existing.estoque = qtd; if(cat) existing.categoria=cat; if(un) existing.unidade=un; if(min) existing.estoqueMin=min; atualizados++; }
      else { DB.medicamentos.push({id:DB.nextMedId++, nome, categoria:cat, unidade:un, estoque:qtd, estoqueMin:min}); adicionados++; }
    });
    salvar(); render();
    toast('✅ Importado: +'+adicionados+' novos, '+atualizados+' atualizados');
  }
}

function processarXLSX(buffer, filename){
  // Use SheetJS via CDN if available, else fallback
  if(typeof XLSX === 'undefined'){
    toast('⚠️ Carregando leitor Excel…','var(--warn)');
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = () => {
      const wb = XLSX.read(buffer, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const csv = XLSX.utils.sheet_to_csv(ws, {FS:';'});
      processarCSV(csv, filename);
    };
    s.onerror = () => toast('❌ Erro ao carregar leitor Excel. Use CSV.','var(--danger)');
    document.head.appendChild(s);
  } else {
    const wb = XLSX.read(buffer, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const csv = XLSX.utils.sheet_to_csv(ws, {FS:';'});
    processarCSV(csv, filename);
  }
}

function normalizarData(str){
  if(!str) return today();
  // dd/mm/yyyy -> yyyy-mm-dd
  const m1 = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(m1) return m1[3]+'-'+m1[2]+'-'+m1[1];
  // yyyy-mm-dd already
  const m2 = str.match(/^\d{4}-\d{2}-\d{2}$/);
  if(m2) return str;
  return today();
}


// ── MULTI-SELECT ────────────────────────────────────────────────
let selectedMeds = new Set();
let selectedMovs = new Set();

function toggleSelectMed(id){
  if(selectedMeds.has(id)) selectedMeds.delete(id);
  else selectedMeds.add(id);
  updateBulkBar('med');
}
function toggleSelectMov(id){
  if(selectedMovs.has(id)) selectedMovs.delete(id);
  else selectedMovs.add(id);
  updateBulkBar('mov');
}
function toggleAllMeds(chk){
  document.querySelectorAll('.chk-med').forEach(c=>{
    const id=Number(c.dataset.id);
    c.checked=chk;
    chk?selectedMeds.add(id):selectedMeds.delete(id);
  });
  updateBulkBar('med');
}
function toggleAllMovs(chk){
  document.querySelectorAll('.chk-mov').forEach(c=>{
    const id=Number(c.dataset.id);
    c.checked=chk;
    chk?selectedMovs.add(id):selectedMovs.delete(id);
  });
  updateBulkBar('mov');
}
function updateBulkBar(type){
  const bar=document.getElementById('bulk-bar-'+type);
  const cnt=document.getElementById('bulk-count-'+type);
  const set=type==='med'?selectedMeds:selectedMovs;
  if(bar){bar.classList.toggle('show',set.size>0);}
  if(cnt) cnt.textContent=set.size;
}
function excluirSelecionadosMed(){
  if(!selectedMeds.size) return;
  openModal('Confirmar Exclusão em Massa',
    '<p style="margin-bottom:16px">Excluir <strong>'+selectedMeds.size+'</strong> medicamento(s) selecionado(s)?</p>'+
    '<div class="row-btns"><button class="btn-danger" onclick="confirmarBulkMed()">Excluir Todos</button><button class="btn-ghost" onclick="closeModal()">Cancelar</button></div>'
  );
}
function confirmarBulkMed(){
  selectedMeds.forEach(id=>{ DB.medicamentos=DB.medicamentos.filter(m=>m.id!==id); });
  selectedMeds.clear(); salvar(); closeModal(); render();
  toast('🗑️ Medicamentos excluídos.','var(--muted)');
}
function excluirSelecionadosMov(){
  if(!selectedMovs.size) return;
  openModal('Confirmar Exclusão em Massa',
    '<p style="margin-bottom:16px">Excluir <strong>'+selectedMovs.size+'</strong> movimentação(ões) selecionada(s)?<br><small style="color:var(--muted)">O estoque será ajustado automaticamente.</small></p>'+
    '<div class="row-btns"><button class="btn-danger" onclick="confirmarBulkMov()">Excluir Todos</button><button class="btn-ghost" onclick="closeModal()">Cancelar</button></div>'
  );
}
function confirmarBulkMov(){
  selectedMovs.forEach(id=>{
    const m=DB.movimentos.find(x=>x.id===id);
    const med=DB.medicamentos.find(x=>x.id===m.medId);
    if(med) med.estoque+=m.tipo==='ENTRADA'?-m.qtd:m.qtd;
    DB.movimentos=DB.movimentos.filter(x=>x.id!==id);
  });
  selectedMovs.clear(); salvar(); closeModal(); render();
  toast('🗑️ Movimentações excluídas.','var(--muted)');
}

// ── ALERTAS VENCIMENTO ──────────────────────────────────────────
function verificarVencimentos(){
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const em30 = new Date(hoje); em30.setDate(em30.getDate()+30);
  const vencidos=[],proximos=[];
  DB.medicamentos.forEach(m=>{
    if(!m.validade) return;
    const v=new Date(m.validade); v.setHours(0,0,0,0);
    if(v<hoje) vencidos.push(m);
    else if(v<=em30) proximos.push(m);
  });
  if(!vencidos.length && !proximos.length) return;
  let html='';
  if(vencidos.length){
    html+='<div style="background:rgba(139,32,32,.1);border:1.5px solid rgba(139,32,32,.4);border-radius:8px;padding:14px 16px;margin-bottom:12px">';
    html+='<div style="color:var(--danger);font-weight:700;font-size:15px;margin-bottom:10px">🚨 '+vencidos.length+' Medicamento(s) VENCIDO(S)</div>';
    html+='<div style="display:flex;flex-direction:column;gap:6px">';
    vencidos.forEach(m=>{ html+='<div style="display:flex;justify-content:space-between;font-size:13px;background:#fff;border-radius:4px;padding:6px 10px"><span><strong>'+m.nome+'</strong></span><span style="color:var(--danger);font-weight:700">Venceu: '+fmtDate(m.validade)+'</span></div>'; });
    html+='</div></div>';
  }
  if(proximos.length){
    html+='<div style="background:rgba(122,92,30,.1);border:1.5px solid rgba(122,92,30,.4);border-radius:8px;padding:14px 16px">';
    html+='<div style="color:var(--warn);font-weight:700;font-size:15px;margin-bottom:10px">⚠️ '+proximos.length+' Medicamento(s) Vencendo em 30 dias</div>';
    html+='<div style="display:flex;flex-direction:column;gap:6px">';
    proximos.forEach(m=>{ const dias=Math.ceil((new Date(m.validade)-hoje)/(1000*60*60*24)); html+='<div style="display:flex;justify-content:space-between;font-size:13px;background:#fff;border-radius:4px;padding:6px 10px"><span><strong>'+m.nome+'</strong></span><span style="color:var(--warn);font-weight:700">'+fmtDate(m.validade)+' ('+dias+'d)</span></div>'; });
    html+='</div></div>';
  }
  html+='<div class="row-btns" style="margin-top:16px"><button class="btn-primary" onclick="setTab(\'estoque\');closeModal()">Ver Estoque</button><button class="btn-ghost" onclick="closeModal()">Fechar</button></div>';
  openModal('⚠️ Alerta de Validade',html);
}

function exportarExcel(){
  const rows=[['Medicamento','Categoria','Unidade','Estoque','Mínimo','Validade','Status']];
  DB.medicamentos.forEach(m=>{
    rows.push([m.nome,m.categoria||'',m.unidade,m.estoque,m.estoqueMin,m.validade?fmtDate(m.validade):'',statusLabel(m)]);
  });
  rows.push([]);
  rows.push(['Data','Tipo','Medicamento','Qtd','Missão/Origem','Responsável','Obs']);
  DB.movimentos.forEach(m=>{rows.push([fmtDate(m.data),m.tipo,m.medNome,m.qtd,m.missao||'',m.responsavel,m.obs||'']);});
  const csv=rows.map(r=>r.map(c=>{const s=String(c);return s.includes(';')||s.includes('"')?'"'+s.replace(/"/g,'""')+'"':s;}).join(';')).join('\n');
  const bom='\uFEFF';
  const b=new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='farmacia_estoque_'+today()+'.csv';a.click();
  toast('✅ Excel exportado!');
}

// ── WHATSAPP BALANCO ────────────────────────────────────────────
function enviarWhatsApp(tel){
  const meds=DB.medicamentos;
  const movs=DB.movimentos;
  const tE=movs.filter(m=>m.tipo==='ENTRADA').reduce((s,m)=>s+m.qtd,0);
  const tS=movs.filter(m=>m.tipo==='SAÍDA').reduce((s,m)=>s+m.qtd,0);
  const criticos=meds.filter(m=>m.estoque<=m.estoqueMin);
  let msg='*FARMÁCIA UMEM — BALANÇO*\n';
  msg+='_NA VANGUARDA COM SAÚDE_\n';
  msg+='Data: '+new Date().toLocaleDateString('pt-BR')+'\n\n';
  msg+='*📦 ESTOQUE ATUAL*\n';
  meds.forEach(m=>{ msg+='• '+m.nome+': *'+m.estoque+'* '+m.unidade+'(s)\n'; });
  msg+='\n*📊 MOVIMENTAÇÕES*\n';
  msg+='Entradas: *'+tE+'* | Saídas: *'+tS+'*\n';
  if(criticos.length){
    msg+='\n*⚠️ ESTOQUE CRÍTICO*\n';
    criticos.forEach(m=>{ msg+='🔴 '+m.nome+': '+m.estoque+'/'+m.estoqueMin+'\n'; });
  }
  msg+='\n_Farmácia UMEM_';
  const phone=tel.replace(/\D/g,'');
  const url='https://wa.me/55'+phone+'?text='+encodeURIComponent(msg);
  window.open(url,'_blank');
}

function abrirCadastro(){
  openModal('Novo Cadastro de Usuário',
    '<div class="field"><label>Nome Completo *</label><input id="cad_nome" placeholder="Ex: Sgt. João Silva"/></div>'+
    '<div class="field"><label>Posto/Grad.</label><input id="cad_posto_grad" placeholder="Ex: Sgt., Cb., Ten."/></div>'+
    '<div class="field"><label>Telefone *</label><input id="cad_tel" placeholder="Ex: (21) 99999-9999" type="tel"/></div>'+
    '<div class="field"><label>E-mail</label><input id="cad_email" placeholder="Ex: joao@marinha.mil.br" type="email"/></div>'+
    '<div style="background:#f0f4ee;border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:14px;font-size:13px;color:var(--muted)">'+
    '⚠️ O cadastro será enviado ao administrador para aprovação. A senha de acesso será fornecida pelo administrador.</div>'+
    '<div class="row-btns"><button class="btn-primary" onclick="salvarCadastro()">Enviar Solicitação</button><button class="btn-ghost" onclick="closeModal()">Cancelar</button></div>'
  );
}
async function salvarCadastro(){

    const nome = document.getElementById('cad_nome').value.trim();
    const posto_grad = document.getElementById('cad_posto_grad').value.trim();
    const tel = document.getElementById('cad_tel').value.trim();
    const email = document.getElementById('cad_email').value.trim();

    if(!nome || !tel){
        toast('Preencha nome e telefone','var(--warn)');
        return;
    }

    const { error } = await supabase
        .from('perfis')
        .insert([{
            nome,
            posto_grad,
            telefone: tel,
            email,
            status: 'Pendente'
        }]);

    if(error){
        toast(error.message,'var(--danger)');
        return;
    }

    closeModal();
    toast('✅ Solicitação enviada!');
};


function renderUsuarios(){
  const cads=(DB.cadastros||[]).slice().reverse();
  const pendentes=cads.filter(c=>c.status==='Pendente').length;
  const rows=cads.length?cads.map(c=>'<tr>'+
    '<td style="font-weight:600">'+c.nome+'</td>'+
    '<td style="color:var(--muted)">'+( c.posto_grad||'—')+'</td>'+
    '<td><span style="cursor:pointer;color:var(--accent)" onclick="enviarWhatsApp(\''+c.tel+'\')" title="Enviar balanço por WhatsApp">📱 '+c.tel+'</span></td>'+
    '<td style="color:var(--muted)">'+(c.email||'—')+'</td>'+
    '<td>'+c.data+'</td>'+
    '<td>'+badge(c.status,c.status==='Pendente'?'var(--warn)':c.status==='Aprovado'?'var(--accent)':'var(--danger)')+'</td>'+
    '<td><div style="display:flex;gap:6px">'+
      '<button class="btn-primary btn-sm" onclick="aprovarCad('+c.id+')">✔ Aprovar</button>'+
      '<button class="btn-danger btn-sm" onclick="recusarCad('+c.id+')">✕</button>'+
    '</div></td>'+
  '</tr>').join(''):'<tr class="empty-row"><td colspan="7">Nenhum cadastro solicitado ainda.</td></tr>';

  return '<div class="gap16">'+
    '<div class="stat-grid">'+
      '<div class="stat-card"><div class="icon">👥</div><div><div class="val">'+cads.length+'</div><div class="lbl">Total Cadastros</div></div></div>'+
      '<div class="stat-card"><div class="icon">⏳</div><div><div class="val" style="color:var(--warn)">'+pendentes+'</div><div class="lbl">Pendentes</div></div></div>'+
      '<div class="stat-card"><div class="icon">✅</div><div><div class="val" style="color:var(--accent)">'+(cads.filter(c=>c.status==='Aprovado').length)+'</div><div class="lbl">Aprovados</div></div></div>'+
    '</div>'+
    '<div class="card card-table">'+
      '<div style="padding:14px 18px;border-bottom:2px solid var(--surf2);font-weight:700;color:var(--accent)">Solicitações de Cadastro</div>'+
      '<div class="tbl-wrap"><table><thead><tr><th>Nome</th><th>Posto/Grad.</th><th>Telefone</th><th>E-mail</th><th>Data</th><th>Status</th><th>Ações</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '</div>'+
  '</div>';
}
function aprovarCad(id){
  const c=(DB.cadastros||[]).find(x=>x.id===id);
  if(c){c.status='Aprovado';salvar();render();toast('✅ Cadastro de '+c.nome+' aprovado!');}
}
function recusarCad(id){
  const c=(DB.cadastros||[]).find(x=>x.id===id);
  if(c){c.status='Recusado';salvar();render();toast('❌ Cadastro recusado.','var(--danger)');}
}
